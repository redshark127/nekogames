<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unblocked Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Unblocked Games</h1>
    <div class="controls">
      <input type="text" id="search" placeholder="Search games..." autocomplete="off">
      <select id="category-filter">
        <option value="all">All Categories</option>
      </select>
    </div>
  </header>

  <main>
    <div id="game-grid"></div>
  </main>

  <div id="overlay" class="hidden">
    <div id="game-modal">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <div class="modal-actions">
          <button id="reload-btn" title="Reload">↻</button>
          <button id="fullscreen-btn" title="Fullscreen">⛶</button>
          <button id="download-btn" title="Download HTML">⬇</button>
          <button id="open-btn" title="Open in new tab">↗</button>
          <button id="close-btn">&times;</button>
        </div>
      </div>
      <iframe id="game-frame" allowfullscreen></iframe>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
