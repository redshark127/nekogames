<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Docs</title>
  <link rel="icon" href="https://www.google.com/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#x25B6;</span>
        <h1>nekogames</h1>
      </div>
      <div class="controls">
        <input type="text" id="search" placeholder="Search games..." autocomplete="off">
        <select id="category-filter">
          <option value="all">All Categories</option>
        </select>
        <button id="ab-btn" style="display:none">about:blank</button>
      </div>
      <a id="request-btn" href="https://forms.gle/4TP4J3fqpZbanuuQ9" target="_blank" rel="noopener" class="request-btn" title="Request a Game">
        <span class="request-icon">&#x1F4DD;</span>
        <span>Request</span>
      </a>
      <button id="settings-btn" title="Settings">&#x2699;</button>
      <div class="header-badge" id="game-count"></div>
    </div>
  </header>

  <div id="settings-panel" class="hidden">
    <div id="settings-backdrop"></div>
    <div id="settings-drawer">
      <div id="settings-header">
        <h2>Settings</h2>
        <button id="settings-close">&times;</button>
      </div>
      <div id="settings-body">
        <div class="setting-group">
          <label class="setting-label">Theme</label>
          <div class="setting-options" id="theme-options">
            <button class="setting-option active" data-theme-val="default">
              <span class="opt-swatch swatch-default"></span>
              Default
            </button>
            <button class="setting-option" data-theme-val="midnight">
              <span class="opt-swatch swatch-midnight"></span>
              Midnight
            </button>
            <button class="setting-option" data-theme-val="light">
              <span class="opt-swatch swatch-light"></span>
              Light
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label class="setting-label">Card Size</label>
          <div class="setting-options" id="size-options">
            <button class="setting-option" data-size="compact">Compact</button>
            <button class="setting-option active" data-size="comfortable">Comfortable</button>
            <button class="setting-option" data-size="spacious">Spacious</button>
          </div>
        </div>
        <div class="setting-group">
          <label class="setting-label">Animations</label>
          <div class="setting-toggle" id="anim-toggle">
            <span>On</span>
            <div class="toggle-track">
              <div class="toggle-thumb"></div>
            </div>
            <span>Off</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main>
    <div id="game-grid"></div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-links">
        <a href="https://github.com/redshark127/nekogames" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-sep">&middot;</span>
        <span id="footer-count"></span>
      </div>
      <div id="dl-container"></div>
    </div>
  </footer>

  <div id="overlay" class="hidden">
    <div id="game-modal">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <div class="modal-actions">
          <button id="reload-btn" title="Reload">&#x21bb;</button>
          <button id="fullscreen-btn" title="Fullscreen">&#x26F6;</button>
          <button id="download-btn" title="Download Game">&#x2B07;</button>
          <button id="open-btn" title="Open in new tab">&#x2197;</button>
          <button id="close-btn">&times;</button>
        </div>
      </div>
      <iframe id="game-frame" allowfullscreen></iframe>
    </div>
  </div>

  <div id="panic-overlay" class="hidden">
    <div class="panic-bar">
      <span>docs.google.com/document/d/1xK...</span>
      <div class="panic-actions">
        <span>File</span><span>Edit</span><span>View</span><span>Help</span>
      </div>
    </div>
    <div class="panic-content">
      <div class="panic-paper">
        <h2>Untitled document</h2>
        <p>This looks like a school document. Nothing to see here.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
